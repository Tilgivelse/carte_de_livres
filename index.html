<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Book Map</title>

  <link rel="stylesheet" href="style.css" />
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />
</head>
<body>
  <main class="container">
    <h1>Моя книжная карта</h1>
    <p class="subtitle">
      Добавь книгу, автора и страну происхождения автора.
    </p>

    <form id="bookForm" class="book-form">
      <label for="title">Название книги</label>
      <input type="text" id="title" name="title" required />

      <label for="author">Имя автора</label>
      <input type="text" id="author" name="author" required />

      <label for="country">Страна происхождения</label>
      <input
        type="text"
        id="country"
        name="country"
        list="countryOptions"
        placeholder="Начни вводить страну..."
        autocomplete="off"
        required
      />

      <datalist id="countryOptions"></datalist>

      <button type="submit">Добавить книгу</button>
    </form>

    <p id="errorMessage" class="error-message"></p>

    <section class="panel">
      <h2>Карта</h2>
      <div id="map"></div>
    </section>

    <section class="panel">
      <div class="panel-header">
        <h2>Добавленные книги</h2>
        <button id="clearAllButton" type="button" class="danger-button">
          Очистить всё
        </button>
      </div>
      <ul id="bookList"></ul>
    </section>

    <section class="panel">
      <h2>Счетчик по странам</h2>
      <ul id="countryCountList"></ul>
    </section>
  </main>

  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>
  <script src="app.js"></script>
</body>
</html>
